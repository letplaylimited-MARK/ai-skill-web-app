name: CI — Type Check, Build & Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  DATABASE_URL: 'postgresql://postgres:password@localhost:5432/ai_skill_web'

jobs:
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

  lint:
    name: ESLint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint
        # 移除 || true，确保 lint 错误真正阻断 CI

  validate-skill-prompts:
    name: Validate Skill Prompts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check all 6 skill prompt files exist
        run: |
          for i in 00 01 02 03 04 05; do
            file="src/lib/skill-prompts/s${i}.txt"
            if [ ! -f "$file" ]; then
              echo "ERROR: Missing skill prompt file: $file"
              exit 1
            fi
            size=$(wc -c < "$file")
            if [ "$size" -lt 100 ]; then
              echo "ERROR: Skill prompt file $file is too small ($size bytes)"
              exit 1
            fi
            echo "✅ $file ($size bytes)"
          done
          echo "All 6 skill prompt files validated successfully"

      - name: Check FW-001 error_handling in s04
        run: |
          if grep -q "error_handling" src/lib/skill-prompts/s04.txt; then
            echo "✅ FW-001: error_handling field present in s04.txt"
          else
            echo "WARNING: FW-001 error_handling field missing in s04.txt"
          fi

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm exec prisma generate

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 7

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit --audit-level=high || echo "Security audit completed with warnings"

      - name: Check for hardcoded secrets
        run: |
          # 检查是否有硬编码的 API Key 模式
          if grep -rn "sk-[a-zA-Z0-9]\{32,\}" src/ --include="*.ts" --include="*.tsx"; then
            echo "ERROR: Potential hardcoded OpenAI API key detected!"
            exit 1
          fi
          if grep -rn "anthropic\|claude" src/ --include="*.ts" --include="*.tsx" | grep -v "import\|comment\|// " | grep -i "api.*key.*=.*['\"].*['\"]"; then
            echo "WARNING: Potential hardcoded Anthropic API key detected"
          fi
          echo "✅ No obvious hardcoded secrets found"
