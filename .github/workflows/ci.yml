name: CI — Type Check, Build & Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  DATABASE_URL: 'postgresql://postgres:password@localhost:5432/ai_skill_web'

jobs:
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

  lint:
    name: ESLint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

  validate-skill-prompts:
    name: Validate Skill Prompts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check all 6 skill prompt files exist
        run: |
          for i in 00 01 02 03 04 05; do
            file="src/lib/skill-prompts/s${i}.txt"
            if [ ! -f "$file" ]; then
              echo "ERROR: Missing skill prompt file: $file"
              exit 1
            fi
            size=$(wc -c < "$file")
            if [ "$size" -lt 100 ]; then
              echo "ERROR: Skill prompt file $file is too small ($size bytes)"
              exit 1
            fi
            echo "✅ $file ($size bytes)"
          done
          echo "All 6 skill prompt files validated successfully"

      - name: Check FW-001 error_handling in s04
        run: |
          if grep -q "error_handling" src/lib/skill-prompts/s04.txt; then
            echo "✅ FW-001: error_handling field present in s04.txt"
          else
            echo "WARNING: FW-001 error_handling field missing in s04.txt"
          fi

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm exec prisma generate

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 7

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks 需要完整历史

      # SEC-004: Secrets 扫描 —— 发现泄露立即失败
      - name: Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # SEC-005: 依赖漏洞扫描 —— CRITICAL 级别阻断，不再静默忽略
      - name: Run security audit (CRITICAL blocks CI)
        run: pnpm audit --audit-level=critical

      # SEC-005b: 补充 high 级别警告（不阻断，生成报告）
      - name: Run security audit (high level warning)
        run: pnpm audit --audit-level=high || echo "⚠️ High-severity vulnerabilities found — review required"

      # SEC-006: 硬编码密钥检测
      - name: Check for hardcoded secrets
        run: |
          if grep -rn "sk-[a-zA-Z0-9]\{32,\}" src/ --include="*.ts" --include="*.tsx"; then
            echo "ERROR: Potential hardcoded OpenAI API key detected!"
            exit 1
          fi
          if grep -rn "sk-ant-[a-zA-Z0-9]" src/ --include="*.ts" --include="*.tsx"; then
            echo "ERROR: Potential hardcoded Anthropic API key detected!"
            exit 1
          fi
          echo "✅ No obvious hardcoded secrets found"

  container-scan:
    name: Container Image Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # SEC-007: Trivy 容器镜像扫描 —— CRITICAL/HIGH 漏洞阻断
      - name: Build Docker image for scanning
        run: docker build -t ai-skill-web-app:ci .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ai-skill-web-app:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy SARIF report (for GitHub Security tab)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ai-skill-web-app:ci'
          format: 'sarif'
          output: 'trivy-results.sarif'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
        if: always()

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        if: always()
